<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScuolaOK!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --t:#2eaab1; --td:#1d8a91; --tl:#e8f7f8; --tm:#b2e2e5;
  --gr:#27ae60; --grb:#eafaf1;
  --or:#f59300; --orb:#fff4e0;
  --re:#e74c3c; --reb:#fdf0ef;
  --bl:#3498db; --blb:#ebf5fb;
  --gy:#7f8c8d; --gyl:#ecf0f1; --gym:#bdc3c7;
  --tx:#2c3e50; --sb:#1a7a80;
  --sh:0 2px 12px rgba(0,0,0,.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito Sans',sans-serif; background:#f0f4f5; color:var(--tx); min-height:100vh; }
.hidden { display:none !important; }
button, input, select, textarea { font-family:inherit; }
button { cursor:pointer; }

.btn { display:inline-flex; align-items:center; gap:5px; padding:8px 16px; border-radius:20px; border:none; font-weight:700; font-size:13px; transition:all .15s; white-space:nowrap; }
.bt  { background:var(--t); color:#fff; }    .bt:hover  { background:var(--td); }
.bo  { background:transparent; color:var(--t); border:2px solid var(--t); } .bo:hover { background:var(--tl); }
.br  { background:var(--re); color:#fff; }   .br:hover  { background:#c0392b; }
.bg  { background:var(--gr); color:#fff; }
.bor { background:var(--or); color:#fff; }
.bsm { padding:4px 10px; font-size:11px; border-radius:14px; }

#LP { min-height:100vh; background:linear-gradient(135deg,#1a7a80,#2eaab1,#3fc1c9); display:flex; align-items:center; justify-content:center; padding:20px; }
.lbox { background:#fff; border-radius:20px; padding:44px 40px 36px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.2); animation:pop .3s ease; }
@keyframes pop { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.llogo { text-align:center; margin-bottom:24px; }
.lico  { width:60px; height:60px; background:linear-gradient(135deg,#2eaab1,#1d8a91); border-radius:14px; display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:10px; }
.llogo h1 { font-family:'Nunito',sans-serif; font-size:26px; font-weight:900; color:var(--td); }
.llogo p  { color:var(--gy); font-size:12px; margin-top:2px; }
.fg { margin-bottom:14px; }
.fg label { display:block; font-weight:700; font-size:12px; margin-bottom:5px; }
.fg input { width:100%; padding:11px 14px; border:2px solid var(--gyl); border-radius:9px; font-size:14px; outline:none; }
.fg input:focus { border-color:var(--t); }
.lbtn { width:100%; padding:13px; border-radius:12px; border:none; background:linear-gradient(135deg,#2eaab1,#1d8a91); color:#fff; font-size:15px; font-weight:900; cursor:pointer; transition:all .2s; margin-top:4px; }
.lbtn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(46,170,177,.4); }
.ldiv { text-align:center; color:var(--gym); font-size:12px; margin:14px 0; position:relative; }
.ldiv::before,.ldiv::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:var(--gyl); }
.ldiv::before { left:0; } .ldiv::after { right:0; }
.rbtn { width:100%; padding:11px; border-radius:12px; border:2px solid var(--t); background:transparent; color:var(--t); font-size:14px; font-weight:800; cursor:pointer; }
.rbtn:hover { background:var(--tl); }
.errb { background:var(--reb); color:var(--re); border-radius:8px; padding:9px 13px; font-size:13px; font-weight:600; margin-bottom:12px; }

#APP { display:flex; flex-direction:column; min-height:100vh; }
.ahdr { background:#fff; border-bottom:2px solid var(--tm); padding:0 22px; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(46,170,177,.08); }
.hlog { display:flex; align-items:center; gap:9px; font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; color:var(--td); }
.hlm  { width:34px; height:34px; background:linear-gradient(135deg,#2eaab1,#1d8a91); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.hsc  { font-size:11px; color:var(--gy); font-weight:600; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.husr { display:flex; align-items:center; gap:9px; font-size:13px; font-weight:700; }
.av   { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#2eaab1,#1d8a91); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:13px; }
.abody { display:flex; flex:1; }

.sbar { width:68px; background:var(--sb); display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:3px; position:sticky; top:58px; height:calc(100vh - 58px); overflow-y:auto; }
.si   { width:54px; height:54px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; color:rgba(255,255,255,.6); font-size:8.5px; font-weight:700; gap:3px; text-align:center; border:none; background:transparent; transition:all .18s; letter-spacing:.2px; }
.si:hover,.si.act { background:rgba(255,255,255,.2); color:#fff; transform:scale(1.05); }
.si .ic { font-size:22px; line-height:1; filter:drop-shadow(0 1px 2px rgba(0,0,0,.18)); }
.sdiv { width:38px; height:1px; background:rgba(255,255,255,.2); margin:5px 0; }
.mc   { flex:1; padding:20px 24px; overflow-y:auto; min-width:0; }

.card { background:#fff; border-radius:12px; box-shadow:var(--sh); overflow:hidden; }
.chdr { background:var(--t); color:#fff; padding:12px 18px; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:space-between; }

.tbl { width:100%; border-collapse:collapse; }
.tbl th { background:var(--t); color:#fff; padding:10px 12px; text-align:left; font-size:11px; font-weight:800; letter-spacing:.4px; text-transform:uppercase; white-space:nowrap; }
.tbl td { padding:9px 12px; border-bottom:1px solid var(--gyl); font-size:13px; vertical-align:middle; }
.tbl td.vtd { padding:0; border-bottom:1px solid var(--gyl); vertical-align:middle; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tr:hover td { background:var(--tl); }
.tscr { overflow-x:auto; }

.grade { display:inline-flex; align-items:center; justify-content:center; min-width:34px; height:28px; border-radius:5px; padding:0 6px; font-weight:700; font-size:14px; font-family:'Roboto',Arial,sans-serif; }
.cg { background:var(--gr); color:#fff; }
.co { background:var(--or); color:#fff; }
.cr { background:var(--re); color:#fff; }
.cb { background:var(--bl); color:#fff; }
.ce { background:var(--gyl); color:var(--gy); }

.vc  { width:100%; min-width:46px; height:58px; min-height:58px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:0; cursor:pointer; transition:opacity .15s; gap:2px; padding:4px 2px; box-sizing:border-box; }
.vc:hover { opacity:.82; }
.vcN { font-family:'Roboto',Arial,sans-serif; font-weight:700; font-size:22px; color:#fff; line-height:1; }
.vcS { font-size:9px; color:rgba(255,255,255,.85); line-height:1.2; text-align:center; }
.ve  { background:#ecf0f1; border-radius:0; width:100%; min-width:46px; height:58px; min-height:58px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-sizing:border-box; }
.ve:hover { background:var(--tm); }

.sc  { background:#fff; border-radius:12px; padding:16px 18px; box-shadow:var(--sh); border-left:4px solid var(--t); }
.sc.or { border-left-color:var(--or); } .sc.re { border-left-color:var(--re); } .sc.gr { border-left-color:var(--gr); }
.scn { font-family:'Nunito',sans-serif; font-weight:900; font-size:28px; }
.scl { font-size:11px; color:var(--gy); font-weight:700; margin-top:2px; }

.mov { position:fixed; inset:0; background:rgba(0,0,0,.48); display:flex; align-items:center; justify-content:center; z-index:999; padding:16px; animation:fi .18s; }
@keyframes fi { from{opacity:0} to{opacity:1} }
.modal { background:#fff; border-radius:16px; width:100%; max-width:600px; max-height:92vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25); animation:su .22s ease; }
.modal.mlg { max-width:860px; }
@keyframes su { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
.mhdr { background:var(--t); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-radius:16px 16px 0 0; position:sticky; top:0; z-index:10; }
.mhdr h3 { font-family:'Nunito',sans-serif; font-weight:900; font-size:15px; }
.mx   { width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.25); border:none; color:#fff; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; }
.mbody { padding:20px; }
.mftr { padding:13px 20px; border-top:1px solid var(--gyl); display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; position:sticky; bottom:0; background:#fff; border-radius:0 0 16px 16px; }

.fg2 { margin-bottom:14px; overflow:hidden; box-sizing:border-box; }
.fg2 label { display:block; font-weight:700; font-size:12px; margin-bottom:5px; }
.fg2 input:not([type=range]),.fg2 select,.fg2 textarea { width:100%; padding:10px 12px; border:2px solid var(--gyl); border-radius:8px; font-size:13px; outline:none; color:var(--tx); }
.fg2 input[type=range] { width:100%; margin-top:8px; accent-color:var(--t); display:block; box-sizing:border-box; padding:0; border:none; background:transparent; max-width:100%; -webkit-appearance:auto; }
.fg2 input:focus,.fg2 select:focus,.fg2 textarea:focus { border-color:var(--t); }
.fg2 textarea { min-height:70px; resize:vertical; }
.fr  { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.fr3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

.cbar { background:#fff; border-radius:12px; padding:12px 18px; display:flex; align-items:center; gap:12px; margin-bottom:16px; box-shadow:var(--sh); flex-wrap:wrap; }
.cnm  { font-family:'Nunito',sans-serif; font-weight:900; font-size:16px; }
.ctabs { display:flex; gap:4px; flex-wrap:wrap; margin-left:auto; }
.ct   { display:flex; flex-direction:column; align-items:center; padding:5px 9px; border-radius:7px; cursor:pointer; font-size:9px; font-weight:700; color:var(--t); border:none; background:transparent; transition:all .15s; gap:2px; }
.ct:hover,.ct.act { background:var(--tl); }
.ct .ci { font-size:18px; }

.empty { background:#fff; border-radius:12px; padding:36px 24px; text-align:center; box-shadow:var(--sh); }
.empty .ei { font-size:44px; margin-bottom:10px; }
.empty h3  { font-family:'Nunito',sans-serif; font-weight:900; font-size:17px; margin-bottom:6px; }
.empty p   { color:var(--gy); font-size:13px; margin-bottom:18px; }

.hcc { background:#fff; border-radius:12px; padding:18px; box-shadow:var(--sh); cursor:pointer; transition:all .15s; border-left:5px solid var(--t); margin-bottom:10px; }
.hcc:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
.hcc h3 { font-family:'Nunito',sans-serif; font-weight:900; font-size:18px; color:var(--td); }

.ab { width:32px; height:32px; border-radius:50%; border:2px solid var(--gym); background:transparent; display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:var(--gy); cursor:pointer; transition:all .15s; }
.ab.P { border-color:var(--gr); color:var(--gr); background:var(--grb); }
.ab.A { border-color:var(--re); color:var(--re); background:var(--reb); }
.ab.R { border-color:var(--or); color:var(--or); background:var(--orb); }
.ab.U { border-color:var(--bl); color:var(--bl); background:var(--blb); }
.ab.F { border-color:var(--gy); color:var(--gy); background:var(--gyl); }

.orgrid { display:grid; gap:3px; }
.orora  { background:#fff; border-radius:5px; box-shadow:var(--sh); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:11px; color:var(--t); min-height:54px; }
.orcell { background:#fff; border-radius:5px; box-shadow:var(--sh); min-height:54px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:10px; font-weight:700; text-align:center; gap:2px; cursor:pointer; transition:all .15s; padding:4px; position:relative; }
.orcell:hover { background:var(--tl); }
.orcell.today { background:var(--tl); border:2px solid var(--t); }
.orcell.hasl  { border-left:3px solid var(--t); }
.ored { position:absolute; top:3px; right:3px; font-size:10px; opacity:0; transition:opacity .15s; }
.orcell:hover .ored { opacity:1; }

.sphdr { background:linear-gradient(135deg,var(--t),var(--td)); color:#fff; padding:22px; border-radius:12px 12px 0 0; text-align:center; }
.spnm  { font-family:'Nunito',sans-serif; font-weight:900; font-size:21px; }
.spst  { display:flex; gap:8px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
.spsi  { background:rgba(255,255,255,.2); border-radius:8px; padding:8px 14px; text-align:center; }
.spsn  { font-family:'Nunito',sans-serif; font-weight:900; font-size:20px; }
.spsl  { font-size:10px; opacity:.85; }

.tbr { display:flex; border-bottom:2px solid var(--gyl); margin-bottom:14px; }
.tbi { padding:9px 15px; cursor:pointer; font-weight:700; font-size:12px; color:var(--gy); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .15s; }
.tbi.act { color:var(--t); border-bottom-color:var(--t); }

.info { background:var(--tl); border-left:4px solid var(--t); border-radius:0 8px 8px 0; padding:10px 14px; font-size:13px; margin-bottom:14px; }

.g2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }

.toast { position:fixed; top:68px; left:50%; transform:translateX(-50%); background:var(--gr); color:#fff; padding:11px 22px; border-radius:9px; font-weight:700; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,.15); z-index:9999; animation:ta .25s ease; pointer-events:none; }
@keyframes ta { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%)} }

/* ── PIANIFICATE PANEL nel giornale ── */
.pia-panel { border-radius:10px; overflow:hidden; margin-bottom:16px; box-shadow:var(--sh); }
.pia-hdr   { background:linear-gradient(90deg,#f59300,#e68200); color:#fff; padding:10px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; }
.pia-hdr h4{ font-family:'Nunito',sans-serif; font-weight:900; font-size:13px; display:flex; align-items:center; gap:8px; }
.pia-body  { background:#fff; }
.pia-row   { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--gyl); flex-wrap:wrap; }
.pia-row:last-child { border-bottom:none; }
.pia-badge { background:var(--orb); color:var(--or); border-radius:6px; padding:3px 10px; font-size:11px; font-weight:800; white-space:nowrap; }
.pia-mat   { color:var(--t); font-weight:800; font-size:12px; white-space:nowrap; }
.pia-arg   { flex:1; font-size:13px; color:var(--tx); min-width:80px; }
.pia-arg.empty-arg { color:var(--gym); font-style:italic; }
.pia-actions { display:flex; gap:5px; flex-shrink:0; }

/* ── DELETE ACCOUNT card ── */
.danger-card { background:#fff; border-radius:12px; padding:22px; box-shadow:var(--sh); border-left:4px solid var(--re); }
.danger-card h3 { font-family:'Nunito',sans-serif; font-weight:900; font-size:17px; margin-bottom:10px; color:var(--re); }
.danger-card p  { font-size:13px; color:var(--gy); margin-bottom:16px; line-height:1.6; }

@media(max-width:700px) {
  .sbar{width:54px;} .si{width:42px;height:42px;}
  .g2,.g3{grid-template-columns:1fr;} .fr{grid-template-columns:1fr;}
  .mc{padding:14px;}
}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="LP">
  <div class="lbox">
    <div class="llogo">
      <div class="lico">📚</div>
      <h1>ScuolaOK!</h1>
      <p>Registro Elettronico per Docenti</p>
    </div>
    <div id="lerr" class="errb hidden"></div>
    <div id="LF">
      <div class="fg"><label>Nome utente</label><input type="text" id="lu" autocomplete="username"></div>
      <div class="fg"><label>Password</label><input type="password" id="lpw" autocomplete="current-password"></div>
      <button class="lbtn" onclick="doLogin()">🔓 Accedi</button>
      <div class="ldiv">oppure</div>
      <button class="rbtn" onclick="showReg()">➕ Registrati — Crea il tuo account</button>
    </div>
    <div id="RF" class="hidden">
      <div class="fg"><label>Nome completo</label><input type="text" id="rn"></div>
      <div class="fg"><label>Nome della scuola</label><input type="text" id="rs"></div>
      <div class="fg"><label>Materia principale</label><input type="text" id="rm"></div>
      <div class="fg"><label>Nome utente</label><input type="text" id="ru" autocomplete="username"></div>
      <div class="fg"><label>Password (min. 6 caratteri)</label><input type="password" id="rp" autocomplete="new-password"></div>
      <button class="lbtn" onclick="doReg()">✅ Crea Account</button>
      <div class="ldiv">oppure</div>
      <button class="rbtn" onclick="showLogin()">← Torna al Login</button>
    </div>
    <div id="LF_LIBRI" class="hidden">
      <div class="fg"><label>Nome utente</label><input type="text" id="lu_lib" autocomplete="username"></div>
      <div class="fg"><label>Password</label><input type="password" id="lpw_lib" autocomplete="current-password"></div>
      <button class="lbtn" onclick="doLoginLibri()" style="background:linear-gradient(135deg,#3498db,#2980b9)">📖 Accedi ai Libri</button>
      <div class="ldiv">oppure</div>
      <button class="rbtn" onclick="showLogin()" style="border-color:var(--bl);color:var(--bl)">← Torna al Login</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="APP" class="hidden">
  <div class="ahdr">
    <div class="hlog"><div class="hlm">📚</div>ScuolaOK!<span class="hsc" id="hSc"></span></div>
    <div class="husr"><div class="av" id="hAv"></div><span id="hNm"></span>
      <button class="btn bo bsm" onclick="doLogout()" style="margin-left:8px">Esci</button>
    </div>
  </div>
  <div class="abody">
    <div class="sbar">
      <button class="si act" id="sb-home"       onclick="goto('home')">      <span class="ic">🏡</span>Home</button>
      <button class="si"     id="sb-registro"   onclick="goto('registro')">  <span class="ic">📒</span>Registro</button>
      <button class="si"     id="sb-scrutini"   onclick="goto('scrutini')">  <span class="ic">📈</span>Scrutini</button>
      <div class="sdiv"></div>
      <button class="si"     id="sb-bacheca"    onclick="goto('bacheca')">   <span class="ic">🗂️</span>Bacheca</button>
      <button class="si"     id="sb-orario"     onclick="goto('orario')">    <span class="ic">🗓️</span>Orario</button>
      <button class="si"     id="sb-planning"   onclick="goto('planning')">  <span class="ic">📅</span>Planning</button>
      <button class="si"     id="sb-calendario" onclick="goto('calendario')"><span class="ic">📅</span>Calendario</button>
      <div class="sdiv"></div>
      <button class="si"     id="sb-classi"     onclick="goto('classi')">    <span class="ic">🎓</span>Classi</button>
      <button class="si"     id="sb-note-cls"   onclick="goto('note-cls')">  <span class="ic">🗒️</span>Note</button>
      <button class="si"     id="sb-colloqui"   onclick="goto('colloqui')">  <span class="ic">🤝</span>Colloqui</button>
      <button class="si"     id="sb-libri"      onclick="goto('libri')">     <span class="ic">📚</span>Libri</button>
      <button class="si"     id="sb-strumenti"  onclick="goto('strumenti')"> <span class="ic">🔧</span>Strumenti</button>
    </div>
    <div class="mc" id="MC"></div>
  </div>
</div>

<!-- LIBRI STANDALONE -->
<div id="LIBRI_APP" class="hidden" style="min-height:100vh;background:#f0f4f5">
  <div class="ahdr" style="background:linear-gradient(135deg,#3498db,#2980b9);border-bottom-color:#2980b9">
    <div class="hlog" style="color:#fff"><div class="hlm" style="background:rgba(255,255,255,.2)">📖</div>Adozione Libri<span class="hsc" id="libSc" style="color:rgba(255,255,255,.7)"></span></div>
    <div class="husr">
      <div class="av" id="libAv" style="background:rgba(255,255,255,.25)"></div>
      <span id="libNm" style="color:#fff"></span>
      <button class="btn bsm" onclick="doLogoutLibri()" style="background:rgba(255,255,255,.2);color:#fff;border:none;margin-left:8px">Esci</button>
    </div>
  </div>
  <div style="padding:24px;max-width:1100px;margin:0 auto" id="LIBRI_MC"></div>
</div>

<div id="MW"></div>
<div id="TW"></div>

<script>
// ── UTILITIES ──
function gi(id)   { return document.getElementById(id); }
function gv(id)   { const el=gi(id); return el ? el.value.trim() : ''; }
function td()     { return new Date().toISOString().split('T')[0]; }
function fmtD(iso){ if(!iso) return ''; const[y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function isoD(it) { if(!it||!it.includes('/')) return td(); const p=it.split('/'); return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }
function dSrt(a,b){ if(!a||!b) return 0; const p=s=>{const q=s.split('/');return new Date(q[2],q[1]-1,q[0]);}; return p(a)-p(b); }
function togEl(id){ const e=gi(id); if(e) e.classList.toggle('hidden'); }

// Filter array of items by current period (items must have .data in dd/mm/yyyy)
function filterByPeriod(items){
  if(!CPERIODO) return items;
  const periodo=(CUR.periodi||[]).find(p=>p.id===CPERIODO);
  if(!periodo) return items;
  const parseIt=s=>{ if(!s) return null; const p=s.split('/'); return new Date(+p[2],+p[1]-1,+p[0]); };
  const dFrom=parseIt(periodo.dal)||new Date(0);
  const dTo=parseIt(periodo.al)||new Date(9999,0,1);
  return items.filter(item=>{ const dt=parseIt(item.data); return dt&&dt>=dFrom&&dt<=dTo; });
}
function notaColor(tipo){
  if(!tipo) return {bg:'var(--tl)',col:'var(--t)',label:'—'};
  const t=tipo.toLowerCase();
  // Rosso: comportamento grave
  if(t.includes('disciplin')||t.includes('ammoniz')||t.includes('allontan')||t.includes('scorretto')||t.includes('disturbo')||t.includes('cellulare')||t.includes('non autoriz')) return {bg:'var(--reb)',col:'var(--re)',label:'🔴'};

  if(t.includes('compiti')||t.includes('materiale')||t.includes('consegnat')||t.includes('preparaz')||t.includes('impegno')||t.includes('ritardo')||t.includes('firma')) return {bg:'var(--orb)',col:'var(--or)',label:'🟡'};
  // Verde: merito, comunicazioni positive
  if(t.includes('merito')||t.includes('eccellen')||t.includes('lodevol')||t.includes('eccezion')||t.includes('comunicaz')||t.includes('avviso')||t.includes('generale')||t.includes('collettiv')||t.includes('promemoria')||t.includes('annotaz')) return {bg:'var(--grb)',col:'var(--gr)',label:'🟢'};

function doLogin(){
  const u=gv('lu'), p=gv('lpw');
  if(!u||!p){ errL('Inserisci nome utente e password.'); return; }
  const usr = DB.users.find(x=>x.username===u && x.password===p);
  if(!usr){ errL('Credenziali non valide.'); return; }
  CUR = usr;
  if(!CUR.data) CUR.data = emptyData();
  if(!CUR.data.lezioniPianificate) CUR.data.lezioniPianificate=[];
  launch();
}

function doReg(){
  const n=gv('rn'), sc=gv('rs'), m=gv('rm'), u=gv('ru'), p=gv('rp');
  if(!n||!sc||!m||!u||!p){ errL('Compila tutti i campi.'); return; }
  if(p.length<6){ errL('La password deve avere almeno 6 caratteri.'); return; }
  if(DB.users.find(x=>x.username===u)){ errL('Nome utente già in uso.'); return; }
  const usr = { id:'u'+Date.now(), nome:n, scuola:sc, materia:m, username:u, password:p, data:emptyData() };
  DB.users.push(usr);
  saveLS();
  CUR = usr;
  launch();
}

  const input = prompt(`Per confermare, digita il tuo nome utente: "${username}"`);

    toast('Nome utente non corrispondente — cancellazione annullata.', true);
    return;

  DB.users = DB.users.filter(x=>x.username !== username);
  saveLS();
  CUR = null; CCLS = null; CTAB = 'giornale'; CPERIODO = null;
  gi('APP').classList.add('hidden');
  gi('LP').classList.remove('hidden');

// ── VOTI SYSTEM ──
const VRAW=[];
VRAW.push({l:'0+',v:0.25}); VRAW.push({l:'0½',v:0.5});
VRAW.push({l:'10-',v:9.75});
for(let n=1;n<=10;n++){
  if(n>1){ VRAW.push({l:(n-1)+'½',v:(n-1)+.5}); VRAW.push({l:(n-1)+'+',v:(n-1)+.25}); }
  VRAW.push({l:''+n, v:n});
  if(n<10) VRAW.push({l:n+'-', v:n-.25});
}
const seenV=new Set();
const VOTI=VRAW.sort((a,b)=>a.v-b.v).filter(x=>{ if(x.v<0.25||seenV.has(x.v)) return false; seenV.add(x.v); return true; });
const SPECIAL_VOTES=['+','++','-','--'];
const COMPETENZE_VOTES=['NA','SA','A','PA'];
const EXCLUDED_VOTES=['CNS','Assente','Esonero'];
function isSpecial(v){ return typeof v==='string'&&['+','++','-','--'].includes(v); }
function isCompetenza(v){ return typeof v==='string'&&COMPETENZE_VOTES.includes(v); }
function isExcluded(v){ return typeof v==='string'&&(EXCLUDED_VOTES.includes(v)||isCompetenza(v)); }

function vL(val){
  if(val===null||val===undefined||val==='') return '';
  if(isSpecial(val)||isCompetenza(val)||val==='CNS') return val;
  if(typeof val==='string'&&isNaN(+val)) return val;
  const f=+val; if(isNaN(f)) return ''+val;
  const x=VOTI.find(v=>Math.abs(v.v-f)<.01); return x?x.l:f.toFixed(2);
}
function vV(lbl){ if(!lbl) return null; const x=VOTI.find(v=>v.l===lbl); return x?x.v:null; }
function gCls(val,numVal){
  if(val===null||val===undefined||val==='') return 'ce';
  if(isSpecial(val)){
    if(numVal===undefined||numVal===null||numVal==='') return 'cb';
    const n=+numVal; if(isNaN(n)) return 'cb';
    return n>0.5?'cg':n>=-0.5?'co':'cr';
  }
  if(isCompetenza(val)) return 'cb'; // competenze always blue
  if(val==='CNS') return 'cr'; // CNS rosso (non consegnato)
  if(typeof val==='string'&&isNaN(+val)) return 'cb';
  const n=+val; if(isNaN(n)) return 'cb';
  return n<5?'cr':n<6?'co':'cg';
}
function gHex(val,numVal){ const c=gCls(val,numVal); return c==='cr'?'#e74c3c':c==='co'?'#f59300':c==='cg'?'#27ae60':c==='cb'?'#3498db':'#bdc3c7'; }
function rndV(n){ return Math.round(n*4)/4; }
function fmtM(n){ return (n===null||n===undefined)?'—':n.toFixed(2); }

function calcM(items){
  const ok=items.filter(x=>!x.ex&&x.p>0&&x.v!==null&&x.v!==undefined&&!isNaN(+x.v));
  if(!ok.length) return null;
  const sp=ok.reduce((s,x)=>s+x.p,0), sv=ok.reduce((s,x)=>s+(+x.v)*x.p,0);
  return sp>0?sv/sp:null;
}
function rebuildSel(aid, raw){
  const sel=gi('vv_'+aid); if(!sel) return;
  const cur=sel.value;
  const n=parseInt(raw,10);
  let opts='<option value="">— nessun voto —</option>'
    +'<option value="Assente"'+(cur==='Assente'?' selected':'')+'>Assente</option>'
    +'<option value="Esonero"'+(cur==='Esonero'?' selected':'')+'>Esonero</option>'
    +'<option value="CNS"'+(cur==='CNS'?' selected':'')+'>CNS – Compito non consegnato</option>';
  if(!isNaN(n)&&String(raw).trim()!==''){
    const targets=[n-0.25,n,n+0.25,n+0.5];
    const variants=VOTI.filter(v=>targets.some(t=>Math.abs(v.v-t)<0.01));
    variants.forEach(v=>{ opts+=`<option value="${v.l}"${v.l===cur?' selected':''}>${v.l}</option>`; });
    sel.innerHTML=opts;
    const exact=variants.find(v=>Math.abs(v.v-n)<0.01);
    if(exact) sel.value=exact.l;
  } else {
    VOTI.forEach(v=>{ opts+=`<option value="${v.l}"${v.l===cur?' selected':''}>${v.l}</option>`; });
  }
  opts+='<optgroup label="--- Annotazioni ---">';
  ['+','++','-','--'].forEach(s=>{ opts+=`<option value="${s}"${s===cur?' selected':''}>${s}</option>`; });
  opts+='</optgroup>';
  opts+='<optgroup label="--- Competenze ---">';
  const compLabels={NA:'NA – Non acquisita',SA:'SA – In via di acquisizione',A:'A – Acquisita',PA:'PA – Pienamente acquisita'};
  ['NA','SA','A','PA'].forEach(s=>{ opts+=`<option value="${s}"${s===cur?' selected':''}>${compLabels[s]}</option>`; });
  opts+='</optgroup>';
  if(isNaN(n)||String(raw).trim()==='') sel.innerHTML=opts;
}
function vOpts(sel='',spec=false){
  let o='<option value="">—</option>';
  if(spec){ o+=`<option value="Assente"${sel==='Assente'?' selected':''}>Assente</option>`; o+=`<option value="Esonero"${sel==='Esonero'?' selected':''}>Esonero</option>`; }
  VOTI.forEach(v=>{ o+=`<option value="${v.l}"${v.l===sel?' selected':''}>${v.l}</option>`; });
  o+='<optgroup label="--- Esclusi dalla media ---">';
  ['CNS'].forEach(s=>{ o+=`<option value="${s}"${s===sel?' selected':''}>CNS – Compito non consegnato</option>`; });
  o+='</optgroup>';
  o+='<optgroup label="--- Annotazioni ---">';
  ['+','++','-','--'].forEach(s=>{ o+=`<option value="${s}"${s===sel?' selected':''}>${s}</option>`; });
  o+='</optgroup>';
  o+='<optgroup label="--- Competenze ---">';
  ['NA','SA','A','PA'].forEach(s=>{
    const labels={NA:'NA – Non acquisita',SA:'SA – In via di acquisizione',A:'A – Acquisita',PA:'PA – Pienamente acquisita'};
    o+=`<option value="${s}"${s===sel?' selected':''}>${labels[s]}</option>`;
  });
  o+='</optgroup>';
  return o;
}

function tabApp(c,cls){
  const d=D();
  const alunni=d.alunni.filter(a=>a.classeId===cls.id).sort((a,b)=>a.n-b.n);
  if(!alunni.length){ c.innerHTML=`<div class="empty"><div class="ei">👨‍🎓</div><h3>Nessun alunno</h3><p>Aggiungi alunni alla classe.</p><button class="btn bt" onclick="openM('addAl','${cls.id}')">➕ Aggiungi Alunni</button></div>`; return; }
  const oggi=new Date().toLocaleDateString('it-IT');
  const aps=d.appello.filter(x=>x.cid===cls.id&&x.data===oggi);
  const P=aps.filter(x=>x.stato==='P').length;
  const A=aps.filter(x=>x.stato==='A').length;
  const R=aps.filter(x=>x.stato==='R').length;

  // Colori cerchio presenza stile Argo
  function statoCircle(stato){
    if(!stato||stato==='—') return {bg:'#fff',border:'#bdc3c7',col:'#bdc3c7',lbl:'—'};
    if(stato==='P') return {bg:'#fff',border:'#27ae60',col:'#27ae60',lbl:'P'};
    if(stato==='A') return {bg:'#fff',border:'#e74c3c',col:'#e74c3c',lbl:'A'};
    if(stato==='R') return {bg:'#fff',border:'#f59300',col:'#f59300',lbl:'R'};
    if(stato==='U') return {bg:'#fff',border:'#3498db',col:'#3498db',lbl:'U'};
    if(stato==='F') return {bg:'#fff',border:'#7f8c8d',col:'#7f8c8d',lbl:'FC'};
    return {bg:'#fff',border:'#bdc3c7',col:'#bdc3c7',lbl:stato};
  }

  c.innerHTML=`
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <span style="font-weight:700;font-size:13px;color:var(--td)">📅 ${oggi}</span>
    <span style="background:var(--grb);color:var(--gr);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700">P: ${P}</span>
    <span style="background:var(--reb);color:var(--re);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700">A: ${A}</span>
    ${R>0?`<span style="background:var(--orb);color:var(--or);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700">R: ${R}</span>`:''}
    <button class="btn bo bsm" style="margin-left:auto" onclick="openM('evMulti','${cls.id}','${oggi}')">➕ Evento Multiplo</button>
  </div>
  <div style="background:#fff;border-radius:12px;box-shadow:var(--sh);overflow-x:auto;-webkit-overflow-scrolling:touch">
    <table style="width:100%;border-collapse:collapse;min-width:640px">
      <thead>
        <tr style="background:var(--t);color:#fff">
          <th style="padding:10px 14px;font-size:11px;font-weight:800;text-align:left;min-width:200px">ALUNNO</th>
          <th style="padding:10px 8px;font-size:11px;font-weight:800;text-align:center;width:60px">GIUST.</th>
          <th style="padding:10px 8px;font-size:11px;font-weight:800;text-align:center;width:80px">PRESENZA</th>
          <th style="padding:10px 14px;font-size:11px;font-weight:800;text-align:left">INGRESSI / USCITE / FUORI CLASSE</th>
          <th style="padding:10px 8px;font-size:11px;font-weight:800;text-align:center;width:50px">NOTE</th>
          <th style="padding:10px 8px;font-size:11px;font-weight:800;text-align:center;width:90px"></th>
        </tr>
      </thead>
      <tbody>
        ${alunni.map((a,idx)=>{
          const ap=aps.find(x=>x.aid===a.id)||null;
          const st=d.appello.filter(x=>x.aid===a.id&&x.cid===cls.id);
          const daGiust=st.filter(x=>x.stato!=='P'&&!x.giustificato);
          const giust=st.filter(x=>x.stato!=='P'&&x.giustificato);
          const sc=statoCircle(ap?ap.stato:'—');
          const noStato=!ap;
          const rowBg=noStato?(idx%2===0?'#fffef0':'#fffde6'):idx%2===0?'#fff':'#f8fbfc';

          // Build ingressi/uscite/fuori classe text
          const movimenti=[];
          if(ap?.ingresso) movimenti.push(`<span style="color:var(--bl);font-weight:700;font-size:12px;cursor:pointer" onclick="openM('setOra','${cls.id}','${a.id}','ing','${oggi}')">Ingresso ${ap.ingresso}</span>`);
          if(ap?.uscita) movimenti.push(`<span style="color:var(--or);font-weight:700;font-size:12px;cursor:pointer" onclick="openM('setOra','${cls.id}','${a.id}','usc','${oggi}')">Uscita ${ap.uscita}</span>`);

          if(ap?.stato==='A') movimenti.push(`<span style="color:var(--re);font-size:12px">Assenza</span>`);

function cycleStato(aid,cid,data){
  const d=D();
  let ap=d.appello.find(x=>x.aid===aid&&x.cid===cid&&x.data===data);
  if(!ap){
    ap={id:'ap'+aid+data.replace(/\//g,''),aid,cid,data,stato:'P',note:'',ingresso:'',uscita:'',fuoriClasse:'',giustificato:false,motivazione:''};
    d.appello.push(ap);
  }
  const cy=['P','A','R','U','F']; ap.stato=cy[(cy.indexOf(ap.stato)+1)%cy.length];
  renderTab(d.classi.find(x=>x.id===cid));
}

function matPills(cls){
  const mats=[cls.materia||'',...(cls.altreMaterie||[])].filter((m,i,a)=>m&&a.indexOf(m)===i);
  if(mats.length<=1) return '';
  if(!CMAT||!mats.includes(CMAT)) CMAT=mats[0];
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
    <span style="font-size:12px;font-weight:700;color:var(--gy);margin-right:4px">📚 Materia:</span>

      style="padding:5px 14px;border-radius:20px;border:2px solid ${CMAT===m?'var(--t)':'var(--gyl)'};
      background:${CMAT===m?'var(--t)':'#fff'};color:${CMAT===m?'#fff':'var(--td)'};
      font-weight:700;font-size:12px;cursor:pointer;transition:.15s">${m}</button>`).join('')}
  </div>`;
}
function getCMAT(cls){
  const mats=[cls.materia||'',...(cls.altreMaterie||[])].filter((m,i,a)=>m&&a.indexOf(m)===i);
  if(mats.length<=1) return null;
  if(!CMAT||!mats.includes(CMAT)) CMAT=mats[0];
  return CMAT;
}

// ── CALENDARIO CLASSE ──
function tabCalClasse(c,cls){
  const d=D(), oggi=new Date();
  if(!CUR._calClasse) CUR._calClasse={};
  if(!CUR._calClasse[cls.id]) CUR._calClasse[cls.id]={y:oggi.getFullYear(),m:oggi.getMonth()};
  const anno=CUR._calClasse[cls.id].y, mese=CUR._calClasse[cls.id].m;
  const nm=new Date(anno,mese,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  const pG=new Date(anno,mese,1).getDay(), gM=new Date(anno,mese+1,0).getDate();
  const off=pG===0?6:pG-1;
  const days=[]; for(let i=0;i<off;i++) days.push(null); for(let i=1;i<=gM;i++) days.push(i);

  // collect events for this class: lezioni, pianificate, verifiche, eventi classe, compiti
  const lezioni=d.programma.filter(p=>p.classeId===cls.id);
  const pianificate=(d.lezioniPianificate||[]).filter(l=>l.classeId===cls.id);
  const verifiche=d.verifiche.filter(v=>v.classeId===cls.id);
  const evClasse=d.eventi.filter(e=>e.clsId===cls.id);
  const compiti=d.compiti.filter(x=>x.classeId===cls.id);

  function eventiGiorno(dn){
    const dtStr=`${String(dn).padStart(2,'0')}/${String(mese+1).padStart(2,'0')}/${anno}`;
    const evs=[];
    lezioni.filter(l=>l.data===dtStr).forEach(l=>evs.push({tipo:'lezione',col:'#2eaab1',testo:`${l.ora||''} ${l.materia||cls.materia}: ${l.arg}`.trim(),id:l.id}));
    pianificate.filter(l=>l.data===dtStr).forEach(l=>evs.push({tipo:'pianificata',col:'#f59300',testo:`📅 ${l.ora||''} ${l.materia||cls.materia}${l.arg?' — '+l.arg:''}`.trim(),id:l.id}));
    verifiche.filter(v=>v.data===dtStr).forEach(v=>evs.push({tipo:'verifica',col:'#8e44ad',testo:`✍️ ${v.et||v.tipo} (${v.materia||cls.materia})`,id:v.id}));
    evClasse.filter(e=>e.data===dtStr).forEach(e=>evs.push({tipo:'evento',col:e.col||'#e85d5d',testo:e.testo,id:e.id}));
    compiti.filter(x=>x.perIl===dtStr).forEach(x=>evs.push({tipo:'compito',col:'#27ae60',testo:`📚 Consegna: ${x.testo.substring(0,30)}`,id:x.id}));
    return evs;
  }

  c.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn bo bsm" onclick="calClsNav('${cls.id}',-1)">◀</button>
      <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;text-transform:capitalize">📅 ${nm} · ${cls.nome}</div>
      <button class="btn bo bsm" onclick="calClsNav('${cls.id}',1)">▶</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bt" onclick="openM('addLez','${cls.id}')">✏️ Firma lezione</button>
      <button class="btn bo" onclick="openM('addVerifica','${cls.id}')">✍️ Verifica</button>
      <button class="btn bo" onclick="openM('addCmp','${cls.id}')">📚 Compito</button>
      <button class="btn bor bsm" onclick="openM('addEventoClasse')">🏫 Evento</button>
    </div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap">
    ${[['#2eaab1','Lezione svolta'],['#f59300','Pianificata'],['#8e44ad','Verifica'],['#27ae60','Consegna compito'],['#e85d5d','Evento']].map(([col,lab])=>
      `<span style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700"><span style="width:10px;height:10px;background:${col};border-radius:2px;display:inline-block"></span>${lab}</span>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
    ${['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(g=>`<div style="text-align:center;font-size:11px;font-weight:800;color:var(--t);padding:5px 0">${g}</div>`).join('')}
    ${days.map(dn=>{
      if(!dn) return '<div></div>';
      const isT=dn===oggi.getDate()&&mese===oggi.getMonth()&&anno===oggi.getFullYear();
      const evs=eventiGiorno(dn);
      const dtStr=String(dn).padStart(2,'0')+'/'+String(mese+1).padStart(2,'0')+'/'+anno;
      return '<div style="min-height:80px;border-radius:8px;padding:5px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.07);'+(isT?'border:2px solid var(--t);':'')+'">'
        +'<div style="font-size:12px;font-weight:800;margin-bottom:3px;'+(isT?'color:var(--t)':'')+'">'+
          (isT?'<span style="background:var(--t);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center">'+dn+'</span>':dn)
        +'</div>'
        +evs.slice(0,4).map(ev=>'<div style="font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;margin-bottom:2px;background:'+ev.col+';color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer" title="'+ev.testo+'">'+ev.testo.substring(0,20)+'</div>').join('')
        +(evs.length>4?'<div style="font-size:9px;color:var(--gy)">+'+( evs.length-4)+' altro</div>':'')
        +'</div>';
    }).join('')}
  </div>`;
}
function calClsNav(cid,dir){
  if(!CUR._calClasse) CUR._calClasse={};
  if(!CUR._calClasse[cid]) CUR._calClasse[cid]={y:new Date().getFullYear(),m:new Date().getMonth()};
  CUR._calClasse[cid].m+=dir;
  if(CUR._calClasse[cid].m>11){CUR._calClasse[cid].m=0;CUR._calClasse[cid].y++;}
  if(CUR._calClasse[cid].m<0){CUR._calClasse[cid].m=11;CUR._calClasse[cid].y--;}
  renderTab(D().classi.find(x=>x.id===cid));
}

function calNav(dir){
  if(!CUR._calMese){ const oggi=new Date(); CUR._calMese={y:oggi.getFullYear(),m:oggi.getMonth()}; }
  CUR._calMese.m+=dir;
  if(CUR._calMese.m>11){CUR._calMese.m=0;CUR._calMese.y++;}
  if(CUR._calMese.m<0){CUR._calMese.m=11;CUR._calMese.y--;}
  pgCal(gi('MC'));
}

function pgPlanning(c){
  const d=D();
  if(!CUR._planWeek){
    const oggi=new Date();
    const dow=oggi.getDay(), diff=dow===0?-6:1-dow;
    const lun=new Date(oggi); lun.setDate(oggi.getDate()+diff);
    CUR._planWeek=lun.toISOString().split('T')[0];
  }
  const lunDate=new Date(CUR._planWeek);
  const weekDates=Array.from({length:6},(_,i)=>{ const d2=new Date(lunDate); d2.setDate(lunDate.getDate()+i); return d2; });
  const dayNames=['LUN','MAR','MER','GIO','VEN','SAB'];
  const oggi=new Date().toISOString().split('T')[0];
  const oreList=['1ª','2ª','3ª','4ª','5ª','6ª','7ª','8ª'];
  const fmtFull=dt=>dt.toLocaleDateString('it-IT',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'}).toUpperCase();
  const fmtShort=dt=>dt.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  const isoStr=dt=>dt.toISOString().split('T')[0];

  // Collect all lessons+pianificate for the week
  function getLessonsForCell(di,oi){
    const cellDate=weekDates[di];
    const cellDateIt=cellDate.toLocaleDateString('it-IT');
    const cellOra=oreList[oi];
    const lessons=[];
    d.classi.forEach(cls=>{
      // Signed lessons
      d.programma.filter(l=>l.classeId===cls.id&&l.data===cellDateIt&&l.ora===cellOra).forEach(l=>{
        lessons.push({type:'done',cls,l,color:'var(--gr)'});
      });
      // Planned lessons
      (d.lezioniPianificate||[]).filter(l=>l.classeId===cls.id&&l.data===cellDateIt&&l.ora===cellOra).forEach(l=>{
        lessons.push({type:'planned',cls,l,color:'var(--or)'});
      });
      // Orario template (no lesson yet)
      const or=(d.orario[cls.id]||{})[di+'_'+oi];
      if(or&&or.mat&&!lessons.find(x=>x.cls.id===cls.id)){
        lessons.push({type:'template',cls,or,color:'#bdc3c7'});
      }
    });
    return lessons;
  }

  const prevWeek=new Date(lunDate); prevWeek.setDate(lunDate.getDate()-7);
  const nextWeek=new Date(lunDate); nextWeek.setDate(lunDate.getDate()+7);

  c.innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <button class="btn bo bsm" onclick="CUR._planWeek='${prevWeek.toISOString().split('T')[0]}';pgPlanning(gi('MC'))">◀</button>
    <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:20px">📆 Planning Settimanale</div>
    <span style="font-size:13px;color:var(--gy);font-weight:600">${fmtShort(weekDates[0])} – ${fmtShort(weekDates[5])}</span>
    <button class="btn bo bsm" onclick="CUR._planWeek='${nextWeek.toISOString().split('T')[0]}';pgPlanning(gi('MC'))">▶</button>
    <button class="btn bo bsm" style="margin-left:auto" onclick="CUR._planWeek=new Date().toISOString().split('T')[0].slice(0,8)+'01';const t=new Date();const dw=t.getDay();const df=dw===0?-6:1-dw;const l=new Date(t);l.setDate(t.getDate()+df);CUR._planWeek=l.toISOString().split('T')[0];pgPlanning(gi('MC'))">📅 Oggi</button>
  </div>
  <div style="overflow-x:auto">
  <table style="border-collapse:collapse;width:100%;min-width:700px">
    <thead>
      <tr>
        <th style="background:var(--t);color:#fff;padding:8px 10px;font-size:11px;font-weight:800;width:48px;text-align:center">ORA</th>
        ${weekDates.map((dt,di)=>{
          const iso=isoStr(dt);
          const isToday=iso===oggi;
          return `<th style="background:${isToday?'var(--td)':'var(--t)'};color:#fff;padding:8px 6px;font-size:11px;font-weight:800;text-align:center;min-width:120px;border-left:2px solid rgba(255,255,255,.2)">
            ${dayNames[di]}<br><span style="font-weight:400;opacity:.85;font-size:10px">${dt.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})}</span>
          </th>`;}).join('')}
      </tr>
    </thead>
    <tbody>
      ${oreList.map((ora,oi)=>`<tr>
        <td style="background:var(--tl);text-align:center;font-weight:900;font-size:11px;color:var(--t);padding:6px 4px;border-bottom:1px solid var(--tm);border-right:2px solid var(--tm)">${ora}</td>
        ${weekDates.map((dt,di)=>{
          const iso=isoStr(dt);
          const isToday=iso===oggi;
          const lessons=getLessonsForCell(di,oi);
          return `<td style="vertical-align:top;padding:3px;border-bottom:1px solid var(--gyl);border-left:1px solid var(--gyl);background:${isToday?'#f8fffd':'#fff'};min-height:60px;cursor:pointer" onclick="openM('addLezFromPlanning','${iso}','${ora}')">
            ${lessons.map(item=>{
              if(item.type==='done') return `<div style="background:var(--gr);color:#fff;border-radius:4px;padding:4px 6px;margin-bottom:2px;font-size:11px;cursor:pointer" onclick="event.stopPropagation();gotoClass('${item.cls.id}')">

                <span style="font-weight:900">${item.cls.nome}</span>
                ${item.l.arg?`<div style="opacity:.85;font-size:10px;margin-top:2px">${item.l.arg.substring(0,30)}${item.l.arg.length>30?'…':''}</div>`:''}
              </div>`;
              if(item.type==='planned') return `<div style="background:var(--or);color:#fff;border-radius:4px;padding:4px 6px;margin-bottom:2px;font-size:11px;cursor:pointer" onclick="event.stopPropagation();openM('editPianificata','${item.cls.id}','${item.l.id}')">
                <span style="font-size:14px">📅</span> <b>- ${item.l.materia||item.cls.materia}</b><br>
                <span style="font-weight:900">${item.cls.nome}</span>
                ${item.l.arg?`<div style="opacity:.85;font-size:10px;margin-top:2px">${item.l.arg.substring(0,30)}…</div>`:''}
              </div>`;
              return `<div style="background:#ecf0f1;color:var(--gy);border-radius:4px;padding:4px 6px;margin-bottom:2px;font-size:11px;cursor:pointer" onclick="event.stopPropagation();CCLS='${item.cls.id}';CTAB='giornale';goto('registro')">

  </div>`;
}

function mk(title,sizeOrBody,bodyOrFtr,ftrOrNone){
  let size='', body, ftr;
  if(sizeOrBody==='lg'){ size='mlg'; body=bodyOrFtr; ftr=ftrOrNone; }
  else { body=sizeOrBody; ftr=bodyOrFtr; }
  return `<div class="mov" onclick="ovClose(event)"><div class="modal ${size}">
    <div class="mhdr"><h3>${title}</h3><button class="mx" onclick="closeM()">✕</button></div>
    <div class="mbody">${body}</div>
    <div class="mftr">${ftr||''}</div>
  </div></div>`;
}
function ovClose(e){ if(e.target.classList.contains('mov')) closeM(); }
function closeM(){ gi('MW').innerHTML=''; }
function spTab(el,pid){
  document.querySelectorAll('.tbi').forEach(t=>t.classList.remove('act')); el.classList.add('act');
  ['tsp0','tsp1','tsp2','tsp3'].forEach(id=>{ const e=gi(id); if(e) e.classList.toggle('hidden',id!==pid); });
}

function saveLez(cid, lid){
  const arg=gv('ma'); if(!arg){ toast('Inserisci l\'argomento.',true); return; }
  const ds=fmtD(gv('md')), ora=gi('mora')?.value||'1ª';
  let mat=gi('mmat')?.value||''; if(mat==='__altro__') mat=gv('mmatAltro');
  const nota=gv('mn'), cmpTesto=gv('mcmp'), cmpPerIl=fmtD(gv('mperil'));
  let lId=lid;
  if(lid){
    const l=D().programma.find(x=>x.id===lid);
    if(l){ l.data=ds; l.arg=arg; l.nota=nota; l.materia=mat; l.ora=ora; }
  } else {
    lId='p'+Date.now();
    D().programma.push({id:lId,classeId:cid,arg,nota,data:ds,materia:mat,ora});
  }
  if(cmpTesto){
    const ec=D().compiti.find(x=>x.lId===lId);
    if(ec){ ec.testo=cmpTesto; ec.perIl=cmpPerIl; }
    else D().compiti.push({id:'c'+Date.now(),classeId:cid,data:ds,testo:cmpTesto,perIl:cmpPerIl,lId});
  }
  closeM(); toast('Lezione salvata ✅'); renderTab(D().classi.find(x=>x.id===cid));
}

function saveOra(cid,aid,tipo,data){
  const orario=gi('morario')?.value; if(!orario){ toast('Inserisci un orario.',true); return; }
  const note=gv('mn');
  let ap=D().appello.find(x=>x.aid===aid&&x.cid===cid&&x.data===data);
  if(!ap){ ap={id:'ap'+aid+data.replace(/\//g,''),aid,cid,data,stato:'P',note:'',ingresso:'',uscita:'',fuoriClasse:'',giustificato:false,motivazione:''}; D().appello.push(ap); }
  if(tipo==='ing'){ ap.ingresso=orario; if(ap.stato==='P') ap.stato='R'; }
  else if(tipo==='usc'){ ap.uscita=orario; if(ap.stato==='P') ap.stato='U'; }
  else if(tipo==='fc'){ ap.fuoriClasse=orario; if(ap.stato==='P') ap.stato='F'; }
  if(note) ap.note=note;
  closeM(); toast('Salvato ✅'); renderTab(D().classi.find(x=>x.id===cid));
}

  const val=isStr_lbl?lbl:vV(lbl), ex=gi('mex')?.value==='si', comm=gv('mcomm'), data=fmtD(gv('md'));
  const peso=+(gi('mpeso')?.value||100);
  const numValRaw=gi('mnumVal')?.value;
  const numVal=(isSpecial(lbl)&&numValRaw!==''&&numValRaw!==undefined&&numValRaw!==null)?parseFloat(numValRaw):null;
  const exFinal=isSpecial(lbl)?(numVal===null?true:ex):(isCompetenza(lbl)||lbl==='CNS')?true:ex;
  const cls=D().classi.find(x=>x.id===cid);
  const materia=CMAT||cls?.materia||'';
  let sId=gi('msId')?.value||'', et='';
  if(sId==='__new__'){
    sId='so'+Date.now(); et=gv('mNewEt')||data;
    D().votiOrali.push({id:'vM'+Date.now(),sId,classeId:cid,aid:'__meta__',val:null,data,et,materia,ex:false,comm:'',meta:true});
  } else if(sId){
    const s=D().votiOrali.find(v=>v.sId===sId&&v.meta); et=s?.et||sId;
  } else {
    sId='free_'+Date.now(); et=data;
  }
  const ex2=D().votiOrali.find(v=>v.sId===sId&&v.aid===aid&&!v.meta);
  // Inherit session peso if this vote belongs to a named session (not free)
  const sessMeta=sId&&!sId.startsWith('free_')?D().votiOrali.find(v=>v.sId===sId&&v.meta):null;
  const pesoFinal=sessMeta?.peso!==undefined?sessMeta.peso:peso;
  if(ex2){ ex2.val=val; ex2.ex=exFinal; ex2.comm=comm; ex2.data=data; ex2.peso=pesoFinal; ex2.numVal=numVal; }
  else D().votiOrali.push({id:'vo'+Date.now(),sId,classeId:cid,aid,val,data,et,materia,ex:exFinal,comm,peso:pesoFinal,numVal});
  closeM(); toast('Voto salvato ✅'); renderTab(D().classi.find(x=>x.id===cid));
}

function saveScrutinio(cid,periodoId){
  if(!CUR.data.scrutini) CUR.data.scrutini={};
  const scKey=cid+'__'+(periodoId||'__all__');
  if(!CUR.data.scrutini[scKey]) CUR.data.scrutini[scKey]={};
  const sc=CUR.data.scrutini[scKey];
  D().alunni.filter(a=>a.classeId===cid).forEach(a=>{
    const v=gi('scv_'+a.id)?.value||'', n=gi('scn_'+a.id)?.value||'';
    if(v||n) sc[a.id]={voto:v,note:n};
  });
  // Segna questo periodo come scrutinato e azzera la vista voti al periodo successivo
  if(!CUR.data.periodiScrutinati) CUR.data.periodiScrutinati={};
  if(!CUR.data.periodiScrutinati[cid]) CUR.data.periodiScrutinati[cid]=[];
  if(periodoId&&periodoId!=='__all__'&&!CUR.data.periodiScrutinati[cid].includes(periodoId)){
    CUR.data.periodiScrutinati[cid].push(periodoId);
  }
  // Imposta CPERIODO al periodo successivo (o null se non ce n'è uno)
  if(periodoId&&periodoId!=='__all__'){
    const periodi=CUR.periodi||[];
    const idx=periodi.findIndex(p=>p.id===periodoId);
    const next=periodi[idx+1]||null;
    CPERIODO=next?next.id:null;
  }
  saveLS(); toast('Verbale salvato ✅ — Tabella aggiornata al periodo successivo');
  closeM();
  // Refresh current tab if in registro
  const cls=D().classi.find(x=>x.id===cid);
  if(cls&&CCLS===cid) renderTab(cls);
}

function saveDSA(cid,aid){
  const al=D().alunni.find(x=>x.id===aid); if(!al) return;
  al.dsa=gi('mdsa')?.value||'Nessuna';
  al.dispense=gv('mdisp'); al.strumenti=gv('mstrum'); al.pdp=gv('mpdp');
  closeM(); toast('Profilo DSA/BES salvato ✅');
}
function saveProfilo(){
  const n=gv('mnome'), sc=gv('mscuola'), m=gv('mmat');
  if(!n||!sc||!m){ toast('Compila tutti i campi.',true); return; }
  CUR.nome=n; CUR.scuola=sc; CUR.materia=m;
  gi('hNm').textContent=n; gi('hSc').textContent=sc;
  gi('hAv').textContent=n.split(' ').map(x=>x[0]).slice(0,2).join('');
  saveLS(); closeM(); toast('Profilo aggiornato ✅');
}
function savePeriodo(){
  const nome=gv('mpnome'); if(!nome){ toast('Inserisci il nome del periodo.',true); return; }
  if(!CUR.periodi) CUR.periodi=[];
  CUR.periodi.push({id:'per'+Date.now(),nome,tipo:gi('mptipo')?.value||'',dal:fmtD(gv('mpdal')),al:fmtD(gv('mpal'))});
  closeM(); toast('Periodo aggiunto ✅'); pgStr(gi('MC'));
}
function delPeriodo(id){
  if(!CUR.periodi) return;
  CUR.periodi=CUR.periodi.filter(p=>p.id!==id);
}
function savePIN(){
  const p1=gi('mpin1')?.value, p2=gi('mpin2')?.value;
  if(!p1||p1.length!==4||!/^\d{4}$/.test(p1)){ toast('Il PIN deve essere di 4 cifre numeriche.',true); return; }
  if(p1!==p2){ toast('I PIN non coincidono.',true); return; }
  CUR.pin=p1; CUR.pinEnabled=true; saveLS();
  closeM(); toast('PIN impostato 🔐'); pgStr(gi('MC'));
}
function savePass(){
  const o=gi('mold')?.value, n=gi('mnew')?.value, c=gi('mconf')?.value;
  if(o!==CUR.password){ toast('Password attuale errata.',true); return; }
  if(n.length<6){ toast('Almeno 6 caratteri.',true); return; }
  if(n!==c){ toast('Le password non coincidono.',true); return; }
  CUR.password=n; saveLS(); closeM(); toast('Password cambiata 🔑');
}

// ── KEYBOARD ──
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeM();
  if(e.key==='Enter' && !gi('LP').classList.contains('hidden')){
    if(!gi('RF').classList.contains('hidden')) doReg(); else doLogin();
  }
});
</script>
